appId: com.lumia.app
productName: Lumia

# ── Publish (GitHub Releases) ─────────────────────────────────────────────────
# Requires GH_TOKEN env var (a GitHub personal-access token with repo scope).
# Use --publish always  → upload on every build
#     --publish onTag   → upload only when HEAD is a git tag (recommended for CI)
publish:
  provider: github
  owner: emtyty
  repo: lumia
  # Publish as a draft so GitHub's /releases/latest API doesn't surface
  # the new version while the mac/win jobs are still uploading. The
  # mark-latest workflow job un-drafts after both finish.
  releaseType: draft

files:
  - out/**/*

extraResources:
  - from: resources/tray
    to: tray
    filter:
      - "**/*.png"
      - "**/*.ico"
  - from: resources/icons/png/icon.png
    to: icons/png/icon.png
  - from: resources/icon.png
    to: icon.png
  - from: resources/picker.html
    to: picker.html
  # macOS Swift helpers — looked up at runtime via process.resourcesPath.
  # CI compiles them as universal (arm64 + x86_64) before packaging via
  # build/compile-mac-helpers.sh. The same script is what local devs run.
  - from: electron/helpers/ocr-vision
    to: ocr-vision
  - from: electron/helpers/window-at-point
    to: window-at-point
  - from: electron/helpers/scroll-helper
    to: scroll-helper

directories:
  buildResources: resources
  output: release

asarUnpack:
  - "node_modules/koffi/**"

# ── Windows ──────────────────────────────────────────────────────────────────
# Code-signing — Standard (OV) or EV code signing certificate
#
#   Certificate types:
#     OV (Organization Validated) — issued immediately; SmartScreen shows a
#     warning until the app accumulates enough download reputation.
#     EV (Extended Validation)    — requires a hardware USB token; SmartScreen
#     warning is suppressed from the very first download.
#
#   Local build (build:win):
#     electron-builder silently skips signing when WIN_CSC_LINK is absent.
#     No env var or flag needed.
#
#   CI / GitHub Actions (release-win job):
#     1. Export your certificate as a .pfx file.
#     2. Base64-encode it:
#          Windows: certutil -encode cert.pfx cert.b64  (then paste contents)
#          macOS:   base64 -i cert.pfx | pbcopy
#     3. Store as repository secrets:
#          WIN_CSC_LINK:          base64-encoded .pfx content
#          WIN_CSC_KEY_PASSWORD:  password set when exporting the .pfx

win:
  icon: resources/icons/win/icon.ico
  target:
    - target: nsis
      arch: [x64, arm64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# ── macOS ─────────────────────────────────────────────────────────────────────
# Code-signing — Developer ID Application certificate
#
#   Local build (build:mac / build:all):
#     CSC_IDENTITY_AUTO_DISCOVERY=false is set in the npm script, so
#     electron-builder skips Keychain lookup and produces an unsigned .app.
#     notarize.cjs detects the missing signature and exits cleanly.
#
#   CI / publish (publish:mac / publish:all):
#     1. Export the "Developer ID Application" cert from Keychain as a .p12.
#     2. Base64-encode it:  base64 -i cert.p12 | pbcopy
#     3. Store as repo secrets, then set in the workflow:
#          CSC_LINK:          ${{ secrets.CSC_LINK }}          # base64 .p12
#          CSC_KEY_PASSWORD:  ${{ secrets.CSC_KEY_PASSWORD }}  # .p12 password
#
# afterSign runs after code-signing; build/notarize.cjs skips gracefully when
# APPLE_* vars are absent (e.g. local builds without notarization credentials).
afterSign: build/notarize.cjs

mac:
  icon: resources/icons/mac/icon.icns
  category: public.app-category.graphics-design
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  darkModeSupport: true
  # TCC prompts read the *UsageDescription strings from the bundle's Info.plist.
  # Without NSMicrophoneUsageDescription, macOS denies mic access without ever
  # prompting the user, which silently breaks the mic toggle during recording.
  extendInfo:
    NSMicrophoneUsageDescription: "Lumia uses the microphone to capture narration when you record your screen with audio."
  # electron-updater on macOS requires a .zip artifact — latest-mac.yml lists
  # the .zip as the primary update file, and the .dmg cannot be applied as an
  # in-place update. Without `zip` here, auto-update fails with "file not
  # found" even though the DMG uploads fine.
  target:
    - target: dmg
      arch: universal
    - target: zip
      arch: universal



dmg:
  window:
    width: 540
    height: 380


