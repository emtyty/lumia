appId: com.lumia.app
productName: Lumia
copyright: Copyright © 2026 Lumia

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*

extraResources:
  - from: resources/tray
    to: tray
    filter:
      - "**/*.png"
      - "**/*.ico"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/build-icons/win/icon.ico

afterSign: scripts/notarize.js

mac:
  target:
    - target: dmg
      arch: [arm64,x64]
    - target: zip
      arch: [arm64,x64]
  icon: resources/build-icons/mac/icon.icns
  category: public.app-category.graphics-design
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

dmg:
  window:
    width: 540
    height: 380

publish:
  provider: github
  owner: haht-dev
  repo: lumia-releases
